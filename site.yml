site:
  title: Documentation for ownCloud (A Kiteworks Company)
  # Deploy target is a GitHub Pages PROJECT site served under a subpath.
  # This URL drives canonical links (used by the Pagefind dedup layout) and
  # absolute asset resolution -- it must match the real publish location.
  url: https://deepdiver1975.github.io/owncloud-docs-monorepo
  # the site's landing page resides in the main content component
  # but it MUST be named ROOT to get a component/version-less landing page.
  # see: https://docs.antora.org/antora/latest/page/start-page/
  # see: https://docs.antora.org/antora/latest/component-name-key/#root-component
  start_page: ROOT::index.adoc

# All content is local now (monorepo). No remote GitHub sources, no branches.
# Each product is a component; each version is a folder carrying its own antora.yml.
content:
  sources:
  - url: .
    start_paths:
    - content/main
    - content/server/*
    - content/ocis/*
    - content/webui
    - content/desktop/*
    - content/ios/*
    - content/android/*

urls:
  # https://docs.antora.org/antora/latest/playbook/urls-redirect-facility/
  redirect_facility: static
  # for multi-version components, the prerelease key decides whether the latest
  # segment is shown in the URL or only redirected when entered.
  latest_version_segment: latest
  latest_version_segment_strategy: replace   # GH Pages do not support 302 redirects

runtime:
  # local content only -- nothing to fetch
  fetch: false
  cache_dir: ./.cache

output:
  clean: true
  dir: public

ui:
  output_dir: assets
  # Stock Antora default UI -- no custom build on our side.
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  # Branding + behaviors (logo, colors, tabs, copy-to-clipboard, Pagefind widget)
  # layered on at build time.
  supplemental_files: ./ui/supplemental

asciidoc:
  attributes:
#   global attributes loaded via antora extension (load-global-site-attributes)
  extensions:
    - ./asciidoc-extensions/tabs.js
    - ./asciidoc-extensions/remote-include-processor.js
    - asciidoctor-kroki # integrated via npm

antora:
  extensions:
    - ./antora-extensions/comp-version.js
    - require: ./antora-extensions/load-global-site-attributes.js
      attributefile: ./global-attributes.yml
      enabled: true
    - require: ./antora-extensions/sitemap-cleanup.js
      validsegments: ['latest']
      preferredsegment: latest
      printsitemapfound: true
      printcontent: false
      enabled: true
    - require: '@sntke/antora-mermaid-extension'
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs
      script_stem: header-scripts
      mermaid_initialize_options:
      start_on_load: true
